<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Saffron AI Monitoring Dashboard</title>

    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 30px;
        }

        h1 {
            text-align: center;
            color: #7b1fa2;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            margin-top: 40px;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
            text-align: center;
        }

        .card h2 {
            margin-bottom: 15px;
            color: #333;
        }

        .value {
            font-size: 40px;
            font-weight: bold;
        }

        .safe {
            color: green;
        }

        .warning {
            color: orange;
        }

        .danger {
            color: red;
        }

        footer {
            text-align: center;
            margin-top: 50px;
            color: gray;
            font-size: 14px;
        }
    </style>
</head>

<body>

<h1>🌸 AI-Based Saffron Plant Monitoring System</h1>

<div class="container">

    <div class="card">
        <h2>Root Rot</h2>
        <div class="value danger">
            {{ data.root_rot }} %
        </div>
    </div>

    <div class="card">
        <h2>Fungal Infection</h2>
        <div class="value warning">
            {{ data.fungal }} %
        </div>
    </div>

    <div class="card">
        <h2>Nutrient Burn</h2>
        <div class="value warning">
            {{ data.nutrient }} %
        </div>
    </div>

    <div class="card">
        <h2>Dehydration Stress</h2>
        <div class="value danger">
            {{ data.dehydration }} %
        </div>
    </div>
